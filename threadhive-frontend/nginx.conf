server {
    listen 3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Client-side routing (react-router): always fall back to index.html
    # so deep links like /thread/:id work on refresh.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache hashed static assets aggressively
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
